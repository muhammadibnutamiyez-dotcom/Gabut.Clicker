<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Gabut Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* --- TAMPILAN (CSS) --- */
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1a1a1a;
            --primary: #6366f1;
            --accent: #f43f5e;
        }

        [data-theme='dark'] {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --primary: #818cf8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            position: absolute;
            transition: 0.5s;
        }

        .hidden { transform: translateY(100vh); opacity: 0; pointer-events: none; }

        /* Tombol-Tombol Modern */
        button {
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            margin: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-main { background: var(--primary); color: white; width: 200px; }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4); }

        .top-right { position: fixed; top: 20px; right: 20px; z-index: 100; }

        /* Game Style */
        .click-target {
            width: 250px;
            height: 250px;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
            -webkit-user-drag: none;
        }

        .click-target:active { transform: scale(0.9); }

        .score-board { font-size: 3rem; font-weight: 900; margin-bottom: 20px; color: var(--primary); }

        .milestone-notif {
            position: fixed;
            top: 20%;
            background: gold;
            color: black;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
            animation: bounce 0.5s infinite;
        }

        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .particle {
            position: absolute;
            color: var(--accent);
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.6s forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body data-theme="light">

    <div class="top-right">
        <button onclick="toggleTheme()" style="background: var(--card); color: var(--text);">🌓 Mode</button>
    </div>

    <div id="view-home" class="container">
        <h1 style="font-size: 3rem; margin-bottom: 0;">🚀 CLICKER GABUT</h1>
        <p>Ayo klik sampai jarimu keriting!</p>
        <button class="btn-main" onclick="changeView('view-game')">🚀 START</button>
        <button class="btn-main" style="background: #64748b;" onclick="changeView('view-settings')">⚙️ SETTINGS</button>
        <button class="btn-main" style="background: #f59e0b;" onclick="changeView('view-leaderboard')">🏆 RANKING</button>
    </div>

    <div id="view-game" class="container hidden">
        <button onclick="changeView('view-home')" style="position: absolute; top:20px; left:20px;">⬅ EXIT</button>
        <div class="score-board" id="score-text">0</div>
        
        <img src="https://files.catbox.moe/hs70e1.webp" 
             id="click-item" 
             class="click-target" 
             onclick="handleInteraction(event)">
        
        <div id="milestone" class="milestone-notif">🎉 SELAMAT! CLAIM 100 KLIK! 🎉</div>
    </div>

    <div id="view-settings" class="container hidden">
        <h2>SETTINGS</h2>
        <div style="text-align: left; background: var(--card); padding: 30px; border-radius: 20px;">
            <p><input type="checkbox" id="check-sound" checked> 🔊 Aktifkan Suara Klik</p>
            <p><input type="checkbox" id="check-effect" checked> ✨ Aktifkan Efek Visual</p>
        </div>
        <button class="btn-main" onclick="changeView('view-home')">SIMPAN</button>
    </div>

    <div id="view-leaderboard" class="container hidden">
        <h2>🏆 LEADERBOARD</h2>
        <div style="display: flex; gap: 20px;">
            <div style="background: var(--card); padding: 20px; border-radius: 15px; min-width: 200px;">
                <h4>Top Clicks</h4>
                <div id="rank-clicks">Loading...</div>
            </div>
            <div style="background: var(--card); padding: 20px; border-radius: 15px; min-width: 200px;">
                <h4>Paling Betah (Time)</h4>
                <div id="rank-time">Loading...</div>
            </div>
        </div>
        <button class="btn-main" onclick="changeView('view-home')">KEMBALI</button>
    </div>

    <script>
        /* --- LOGIKA GAME (JAVASCRIPT) --- */
        let clicks = 0;
        let startTime = Date.now();
        
        // --- ISI LINK AUDIO DI SINI ---
        const sfxClick = new Audio('https://files.catbox.moe/jib91e.mp3');

        // --- KONFIGURASI SUPABASE (ISI DI SINI) ---
        const SB_URL = "URL_SUPABASE_ANDA"; 
        const SB_KEY = "ANON_KEY_ANDA";
        const supabase = (typeof supabase !== 'undefined') ? supabase.createClient(SB_URL, SB_KEY) : null;

        function changeView(id) {
            document.querySelectorAll('.container').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'view-leaderboard') fetchLeaderboard();
        }

        function toggleTheme() {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        }

        function handleInteraction(e) {
            clicks++;
            document.getElementById('score-text').innerText = clicks;

            // Suara
            if(document.getElementById('check-sound').checked) {
                sfxClick.currentTime = 0;
                sfxClick.play();
            }

            // Efek Partikel
            if(document.getElementById('check-effect').checked) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = '+1';
                p.style.left = e.pageX + 'px';
                p.style.top = e.pageY + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }

            // Milestone 100
            if(clicks % 100 === 0) {
                const m = document.getElementById('milestone');
                m.style.display = 'block';
                setTimeout(() => m.style.display = 'none', 3000);
                saveData(); // Simpan otomatis setiap 100 klik
            }
        }

        async function saveData() {
            if(!supabase) return;
            const playTime = Math.floor((Date.now() - startTime) / 1000);
            const user = "Player1"; // Kamu bisa ganti pakai sistem prompt nama

            await supabase.from('players').upsert({ 
                username: user, 
                total_clicks: clicks, 
                time_played: playTime 
            });
        }

        async function fetchLeaderboard() {
            if(!supabase) return;
            // Ambil data dari Supabase dan tampilkan di rank-clicks & rank-time
            // (Kode fetch akan aktif jika URL & KEY Supabase sudah diisi)
        }
    </script>
</body>
</html>
